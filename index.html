<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBlitz - 实时答题竞赛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --dark: #0f172a;
      --darker: #020617;
      --light: #f8fafc;
      --glass: rgba(255,255,255,0.1);
      --glass-border: rgba(255,255,255,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--darker);
      min-height: 100vh;
      color: var(--light);
      overflow-x: hidden;
    }
    .bg-animation {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(99,102,241,0.3) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(236,72,153,0.2) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-5%, -5%) scale(1.1); }
    }
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.5;
      animation: float 20s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 3s ease-in-out infinite;
      letter-spacing: 4px;
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(99,102,241,0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(236,72,153,0.7)); }
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;
      margin-bottom: 40px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: cardAppear 0.6s ease-out;
    }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .mode-card {
      background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(236,72,153,0.1) 100%);
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .mode-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(99,102,241,0.3);
    }
    .mode-icon { font-size: 4rem; margin-bottom: 20px; display: block; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .mode-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; color: white; }
    .mode-desc { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(99,102,241,0.5); }
    .btn-success { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: white; }
    .btn-success:hover { transform: translateY(-3px); }
    .btn-danger { background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%); color: white; }
    .btn-danger:hover { transform: translateY(-3px); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    input, textarea, select {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border: 2px solid var(--glass-border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: white;
      transition: all 0.3s ease;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }
    select option { background: var(--dark); color: white; }
    .room-code-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 900;
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3) 0%, rgba(236,72,153,0.2) 100%);
      border-radius: 20px;
      border: 2px solid var(--primary);
      animation: codePulse 2s ease-in-out infinite;
      letter-spacing: 12px;
      margin: 20px 0;
    }
    @keyframes codePulse {
      0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.3); }
      50% { box-shadow: 0 0 50px rgba(236,72,153,0.5); }
    }
    .question-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.4) 0%, rgba(236,72,153,0.3) 100%);
      border: 2px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      position: relative;
    }
    .question-number { font-size: 0.9rem; color: rgba(255,255,255,0.6); margin-bottom: 10px; letter-spacing: 4px; }
    .question-text { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 700; margin-bottom: 30px; position: relative; line-height: 1.5; }
    .timer-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      margin: 20px 0;
      display: inline-block;
      animation: timerPop 0.5s ease-out;
    }
    @keyframes timerPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .timer-normal { color: white; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
    .timer-warning { color: var(--accent); animation: timerShake 0.5s ease-in-out infinite; }
    .timer-danger { color: var(--danger); animation: timerShake 0.2s ease-in-out infinite; }
    @keyframes timerShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    @media (max-width: 500px) {
      .options-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; padding: 0 4px; box-sizing: border-box; }
    }
    .option-btn {
      padding: 20px 16px;
      background: rgba(255,255,255,0.1);
      border: 2px solid var(--glass-border);
      border-radius: 14px;
      color: white;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: hidden;
    }
    @media (max-width: 500px) {
      .option-btn {
        padding: 12px 8px;
        font-size: 1.4rem;
        min-height: 60px;
      }
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(99,102,241,0.3);
      border-color: var(--primary);
    }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .option-btn.correct { background: rgba(16,185,129,0.3) !important; border-color: var(--success) !important; }
    .option-btn.wrong { background: rgba(239,68,68,0.3) !important; border-color: var(--danger) !important; }
    .option-btn.selected { background: rgba(99,102,241,0.4) !important; border-color: var(--primary) !important; }
    .ranking-list { margin-top: 20px; }
    .ranking-item {
      display: flex;
      align-items: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      margin-bottom: 12px;
      animation: rankingAppear 0.5s ease-out backwards;
    }
    .ranking-item:nth-child(1) { animation-delay: 0.1s; }
    .ranking-item:nth-child(2) { animation-delay: 0.2s; }
    .ranking-item:nth-child(3) { animation-delay: 0.3s; }
    @keyframes rankingAppear {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .ranking-item.top-3 {
      background: linear-gradient(135deg, rgba(245,158,11,0.2) 0%, rgba(245,158,11,0.1) 100%);
      border: 1px solid rgba(245,158,11,0.3);
    }
    .rank-badge { font-size: 2rem; margin-right: 16px; width: 50px; text-align: center; }
    .rank-1 .rank-badge { filter: drop-shadow(0 0 10px gold); }
    .rank-2 .rank-badge { filter: drop-shadow(0 0 10px silver); }
    .rank-3 .rank-badge { filter: drop-shadow(0 0 10px #cd7f32); }
    .ranking-name { flex: 1; font-weight: 600; font-size: 1.1rem; }
    .ranking-score { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .ranking-you { color: var(--primary); font-size: 0.85rem; margin-left: 8px; }
    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      text-align: center;
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .status-info { background: rgba(99,102,241,0.3); color: var(--primary); }
    .status-success { background: rgba(16,185,129,0.3); color: var(--success); }
    .status-warning { background: rgba(245,158,11,0.3); color: var(--accent); }
    .status-danger { background: rgba(239,68,68,0.3); color: var(--danger); }
    .qr-container { text-align: center; padding: 30px; background: white; border-radius: 20px; display: inline-block; margin: 20px 0; }
    .qr-url {
      font-family: monospace;
      background: var(--darker);
      color: var(--success);
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 16px;
      display: inline-block;
      font-size: 0.9rem;
    }
    .winner-trophy { font-size: 6rem; animation: trophyBounce 1s ease-in-out infinite; }
    @keyframes trophyBounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    .winner-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      margin: 20px 0;
      background: linear-gradient(135deg, gold 0%, orange 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      animation: confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    .form-section { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 24px; }
    .form-section h3 { font-size: 1.1rem; margin-bottom: 16px; color: var(--primary); }
    .question-list { margin-top: 24px; }
    .question-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border-left: 4px solid var(--primary);
    }
    .question-item-header { font-weight: 600; margin-bottom: 8px; }
    .question-item-options { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
    .correct-badge { color: var(--success); font-weight: 700; }
    .hidden { display: none !important; }
    .loading {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-title { font-size: 1rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }
    .game-controls { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: toastIn 0.5s ease-out, toastOut 0.5s ease-in 2.5s forwards;
      z-index: 1000;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .player-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .player-info { flex: 1; }
    .player-name { font-weight: 600; margin-bottom: 2px; }
    .player-score { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <h1>QUIZBLITZ</h1>
    <p class="subtitle">实时答题竞赛</p>

    <!-- 模式选择 -->
    <div id="modeSelection" class="card">
      <div class="mode-grid">
        <div class="mode-card" onclick="showTeacherMode()">
          <span class="mode-icon">👨‍🏫</span>
          <div class="mode-title">我是老师</div>
          <div class="mode-desc">创建房间、添加题目、发起游戏</div>
        </div>
        <div class="mode-card" onclick="showStudentMode()">
          <span class="mode-icon">👨‍🎓</span>
          <div class="mode-title">我是学生</div>
          <div class="mode-desc">扫码或输入房间码加入游戏</div>
        </div>
      </div>
    </div>

    <!-- 老师模式 -->
    <div id="teacherJoin" class="card hidden">
      <h2>👨‍🏫 老师控制台</h2>
      <div id="teacherRoomInfo" class="hidden">
        <div style="text-align: center; margin-bottom: 30px;">
          <div class="section-title">房间码</div>
          <div class="room-code-display" id="teacherRoomCode" style="font-size: 3rem; margin: 15px 0;"></div>
          <div class="qr-container" style="background: white; border-radius: 16px; padding: 20px; display: inline-block;">
            <canvas id="qrcode" width="180" height="180"></canvas>
          </div>
          <div class="qr-url" id="qrUrl" style="margin-top: 12px;"></div>
          <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 10px;">学生扫码直接加入房间</p>
        </div>
        <div class="game-controls" style="justify-content: center;">
          <button class="btn btn-primary" onclick="showTeacherEditor()">📝 编辑题目</button>
          <button class="btn btn-success" onclick="startGame()">🎮 开始游戏</button>
          <button class="btn btn-danger" onclick="resetGame()">🔄 重置</button>
        </div>
      </div>
      <div id="teacherCreate">
        <div style="text-align: center; padding: 40px 0;">
          <button class="btn btn-primary" onclick="createRoom()" style="padding: 20px 50px; font-size: 1.2rem;">✨ 创建新房间</button>
        </div>
        <div style="text-align: center;">
          <button class="btn btn-secondary" onclick="showModeSelection()">← 返回选择</button>
        </div>
      </div>
    </div>

    <!-- 题目编辑 -->
    <div id="teacherEditor" class="card hidden">
      <h2>📝 编辑题目</h2>
      <div class="form-grid">
        <div class="form-section">
          <h3>内置题库</h3>
          <select id="builtInBankSelect">
            <option value="">选择题库...</option>
          </select>
          <button class="btn btn-success" onclick="importBuiltInBank()" style="width: 100%; margin-top: 10px;">导入选中题库</button>
        </div>
        <div class="form-section">
          <h3>手动添加</h3>
          <input type="text" id="questionText" placeholder="题目内容">
          <input type="text" id="option0" placeholder="选项 A">
          <input type="text" id="option1" placeholder="选项 B">
          <input type="text" id="option2" placeholder="选项 C">
          <input type="text" id="option3" placeholder="选项 D">
          <select id="correctAnswer">
            <option value="0">正确答案: A</option>
            <option value="1">正确答案: B</option>
            <option value="2">正确答案: C</option>
            <option value="3">正确答案: D</option>
          </select>
          <input type="number" id="timeLimit" value="15" min="5" max="60">
          <button class="btn btn-primary" onclick="addSingleQuestion()" style="width: 100%;">添加题目</button>
        </div>
      </div>
      <div class="form-section" style="margin-top: 20px;">
        <h3>批量导入 JSON</h3>
        <textarea id="jsonImport" placeholder='[{"question":"题目1","options":["A","B","C","D"],"correctAnswer":0,"timeLimit":15}]' style="min-height: 120px;"></textarea>
        <button class="btn btn-success" onclick="importQuestions()" style="width: 100%; margin-top: 10px;">导入题目</button>
      </div>
      <div id="questionList" class="question-list"></div>
      <div style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="showTeacherRoom()">← 返回房间</button>
      </div>
    </div>

    <!-- 游戏控制 -->
    <div id="teacherControl" class="card hidden">
      <h2>🎮 游戏控制台</h2>
      <div id="gameStatus" class="status-badge status-info">等待开始</div>

      <div id="teacherQuestionDisplay" class="question-box" style="margin-top: 20px;">
        <div class="question-number" id="teacherQuestionNumber">第 1 题</div>
        <div class="question-text" id="teacherQuestionText">等待发题...</div>
        <div class="timer-display timer-normal" id="teacherTimerDisplay" style="font-size: 3rem;">--</div>
        <div class="options-grid" id="teacherOptionsDisplay" style="margin-top: 30px;"></div>
      </div>

      <div class="game-controls" style="margin-top: 20px;">
        <button class="btn btn-primary" id="nextQuestionBtn" onclick="nextQuestion()">下一题</button>
        <button class="btn btn-danger" id="stopAnswerBtn" onclick="stopAnswer()" disabled>停止答题</button>
        <button class="btn btn-success" id="showRankingBtn" onclick="showRanking()" disabled>显示排名</button>
      </div>

      <div id="teacherRankings" class="ranking-list hidden"></div>

      <h3 style="margin-top: 30px;">👥 在线玩家 (<span id="playerCount">0</span>)</h3>
      <div id="teacherPlayerList" class="player-grid"></div>

      <div style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="showTeacherRoom()">← 返回房间</button>
      </div>
    </div>

    <!-- 学生模式 -->

        { question: `说话人说"山田，你才学了半年汉语，可是比我说得流利多了。" 判断：山田学习汉语的时间非常长。`, options: ["正确", "错误"], correctAnswer: 1, timeLimit: 10 },

        { question: "今天的客厅我已经打扫________ (Finished) 了。", answer: "完了", timeLimit: 15 },

    // ===== GoEasy 初始化 =====
    let goEasyConnected = false;

    function initGoEasy() {
      if (goEasy) return goEasy;

      goEasy = GoEasy.getInstance({
        appkey: GOEASY_APPKEY,
        host: 'hangzhou.goeasy.io',
        modules: ['PUBSUB']
      });

      goEasy.connect({
        onSuccess: function() {
          console.log('GoEasy connected!');
          goEasyConnected = true;
        },
        onFailed: function(error) {
          console.error('GoEasy connect failed:', error);
          goEasyConnected = false;
        }
      });

      console.log('GoEasy initializing...');
      return goEasy;
    }

    function subscribeToRoom(room) {
      if (goEasyChannel) {
        goEasyChannel.unsubscribe();
      }

      initGoEasy();

      // Wait for connection before subscribing
      let attempts = 0;
      let subscribeInterval = setInterval(function() {
        attempts++;
        if (goEasyConnected) {
          clearInterval(subscribeInterval);
          doSubscribe(room);
        } else if (attempts > 50) {
          clearInterval(subscribeInterval);
          console.error('GoEasy connection timeout');
        }
      }, 100);
    }

    function doSubscribe(room) {
      currentChannelName = 'quizblitz-' + room;
      goEasyChannel = goEasy.pubsub.subscribe({
        channel: currentChannelName,
        onMessage: function(message) {
          console.log('GoEasy message received:', message.content);
          try {
            const data = JSON.parse(message.content);
            handleGoEasyEvent(data);
          } catch (e) {
            console.error('Parse error:', e);
          }
        },
        onSuccess: function() {
          console.log('Subscribed to channel:', currentChannelName);
        },
        onFailed: function(error) {
          console.error('Subscribe failed:', error);
        }
      });

      return goEasyChannel;
    }

    function publishEvent(eventName, data) {
      if (!currentChannelName) {
        console.error('No GoEasy channel subscribed');
        return;
      }

      const eventData = {
        type: eventName,
        ...data,
        room: roomCode,
        timestamp: Date.now()
      };

      console.log('Publishing:', eventName, eventData);
      goEasy.pubsub.publish({
        channel: currentChannelName,
        message: JSON.stringify(eventData),
        onSuccess: function() {
          console.log('Published:', eventName);
        },
        onFailed: function(error) {
          console.error('Publish failed:', error);
        }
      });
    }

    function handleGoEasyEvent(data) {
      console.log('handleGoEasyEvent:', data);

      switch(data.type) {
        case 'game-start':
          gameStatus = 'playing';
          if (!isHost) {
            updateWaitingStatus('游戏开始！');
          }
          break;

        case 'question':
          currentQuestionIndex = data.questionIndex;
          const q = data.question;
          if (q) {
            if (isHost) {
              showQuestionToTeacher(data.questionIndex, q);
            } else {
              // 学生端保存题目到本地
              questions[currentQuestionIndex] = q;
              showQuestionToStudent(data.questionIndex, q);
            }
          }
          break;

        case 'stop-question':
          if (!isHost) {
            stopTimers();
            qsa('.option-btn').forEach(btn => btn.disabled = true);
            if (data.correctAnswer !== undefined) {
              const correctOpt = $(`opt-${data.correctAnswer}`);
              if (correctOpt) correctOpt.classList.add('correct');
            }
          }
          break;

        case 'show-ranking':
          if (!isHost) {
            showStudentRanking(data.rankings);
          }
          break;

        case 'game-finished':
          gameStatus = 'finished';
          if (!isHost) {
            showFinalRanking(data.rankings);
          }
          break;

        case 'game-reset':
          gameStatus = 'waiting';
          currentQuestionIndex = -1;
          myScore = 0;
          if (!isHost) {
            show('studentWaiting');
            hide('studentQuiz');
            updateWaitingStatus('游戏已重置，等待再次开始');
          }
          break;

        case 'player-joined':
          if (data.players) {
            players = data.players;
            updatePlayerList(players);
          }
          break;

        case 'answer-submitted':
          if (data.answerResult) {
            const result = data.answerResult;
            // 找到对应玩家并更新分数
            const player = players.find(p => p.id === result.playerId);
            if (player) {
              player.score = result.totalScore;
              updatePlayerList(players);
            }
            // 如果是教师自己（host）的答案
            if (result.playerId === myPlayerId) {
              hasAnswered = true;
              stopTimers();
              const resultEl = $('resultStatus');
              if (result.isCorrect) {
                resultEl.textContent = `✓ 回答正确！+${result.points} 分`;
                resultEl.style.color = '#10b981';
              } else {
                resultEl.textContent = '✗ 回答错误';
                resultEl.style.color = '#ef4444';
              }
              myScore = result.totalScore;
              $('myScore').textContent = myScore;
              show('studentResult');
              qsa('.option-btn').forEach(btn => btn.disabled = true);
            }
          }
          break;
      }
    }

    // ===== 工具函数 =====
    const $ = id => document.getElementById(id);
    const show = id => $(id).classList.remove('hidden');
    const hide = id => $(id).classList.add('hidden');
    const qsa = sel => document.querySelectorAll(sel);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.createElement('div');

      document.body.appendChild(toast);

        container.appendChild(particle);

    function showConfetti() {

      const colors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#ef4444', '#ffd700'];

        const piece = document.createElement('div');
        piece.className = 'confetti-piece';

        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 4000);

    function generateQR(text, canvasId = 'qrcode') {
      const canvas = $(canvasId);
      if (!canvas) return;
      const size = canvas.width || 200;
      canvas.height = size;
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
      };
      img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
    }

    function hideAllScreens() {
      ['modeSelection', 'teacherJoin', 'teacherEditor', 'teacherControl',
       'studentMode', 'studentQuiz', 'finalRanking'].forEach(id => hide(id));

    function showModeSelection() { hideAllScreens(); show('modeSelection'); }
    function showTeacherMode() { hideAllScreens(); show('teacherJoin'); }

    // ===== 房间管理 =====
    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function createRoom() {
      roomCode = generateRoomCode();
      myRole = 'teacher';
      isHost = true;
      myPlayerId = 'host_' + Date.now();
      gameStatus = 'waiting';
      questions = [];
      players = [{ id: myPlayerId, name: '老师', score: 0 }];

      $('teacherRoomCode').textContent = roomCode;
      hide('teacherCreate');
      show('teacherRoomInfo');

      let baseUrl = window.location.origin;
      if (window.location.pathname.includes('/quizblitz/')) {
        baseUrl = window.location.origin + '/quizblitz';
      }
      const joinUrl = `${baseUrl}?room=${roomCode}`;
      $('qrUrl').textContent = joinUrl;
      generateQR(joinUrl, 'qrcode');

      updatePlayerList(players);
      subscribeToRoom(roomCode);

      showToast('房间创建成功！');
    }

    function joinRoom() {
      const code = $('roomCode').value.trim().toUpperCase();
      const name = $('playerName').value.trim() || '玩家' + Math.floor(Math.random() * 1000);
      if (!code || code.length < 4) { showToast('请输入正确的房间码'); return; }

      roomCode = code;
      myRole = 'student';
      isHost = false;
      myPlayerId = 'player_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

      $('studentRoomCode').textContent = roomCode;
      show('studentWaiting');
      hide('studentJoin');
      updateWaitingStatus('正在连接房间...');

      subscribeToRoom(roomCode);

      setTimeout(() => {
        const player = { id: myPlayerId, name: name, score: 0 };
        players.push(player);
        publishEvent('player-joined', { player: player, players: players });
        updateWaitingStatus('已加入房间，等待游戏开始...');
      }, 500);
    }

    // ===== 教师功能 =====
    function addSingleQuestion() {
      const questionText = $('questionText').value.trim();
      const options = [$('option0').value.trim(), $('option1').value.trim(),
                       $('option2').value.trim(), $('option3').value.trim()];
      const correctAnswer = parseInt($('correctAnswer').value);
      const timeLimit = parseInt($('timeLimit').value) || 15;

      if (!questionText || options.some(o => !o)) {
        showToast('请填写完整题目和所有选项');
        return;
      }

      const question = {
        id: 'q_' + Date.now(),
        question: questionText,
        options: options,
        correctAnswer: correctAnswer,
        timeLimit: timeLimit
      };

      questions.push(question);
      renderQuestionList();

      $('questionText').value = '';
      $('option0').value = ''; $('option1').value = ''; $('option2').value = ''; $('option3').value = '';
      showToast('题目添加成功');
    }

    function importQuestions() {
      const text = $('jsonImport').value.trim();
      if (!text) { showToast('请输入 JSON 数据'); return; }
      let imported;
      try { imported = JSON.parse(text); } catch (e) { showToast('JSON 格式错误'); return; }
      if (!Array.isArray(imported)) imported = [imported];

      for (let i = 0; i < imported.length; i++) {
        const q = imported[i];
        const question = {
          id: 'q_' + Date.now() + '_' + i,
          question: q.question,
          options: q.options,
          answer: q.answer || null,
          correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : -1,
          timeLimit: q.timeLimit || 15
        };
        questions.push(question);
      }

      $('jsonImport').value = '';
      renderQuestionList();
      showToast(`成功导入 ${imported.length} 道题目`);
    }

    function renderQuestionList() {
      const container = $('questionList');
      if (questions.length === 0) {
        container.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">暂无题目，请添加题目</p>';
        return;
      }
      container.innerHTML = `
        <h3 style="margin-bottom: 16px;">已添加 ${questions.length} 道题目</h3>
        ${questions.map((q, i) => `
          <div class="question-item">
            <div class="question-item-header">${i + 1}. ${escapeHtml(q.question)}</div>
            <div class="question-item-options">
              ${q.options && q.options.length > 0
                ? q.options.map((o, j) => `<span class="${j === q.correctAnswer ? 'correct-badge' : ''}">${String.fromCharCode(65 + j)}. ${escapeHtml(o)}</span>`).join(' | ')
                : `<span style="color: var(--accent);">填空题 (答案: ${q.answer || '未设置'})</span>`
              }
            </div>
          </div>
        `).join('')}
      `;
    }

    function importBuiltInBank() {
      const bankName = $('builtInBankSelect').value;
      if (!bankName) { showToast('请先选择题库'); return; }
      const bank = BUILT_IN_BANKS[bankName];
      if (!bank) return;

      for (let i = 0; i < bank.length; i++) {
        const q = bank[i];
        const question = {
          id: 'bank_' + Date.now() + '_' + i,
          question: q.question,
          options: q.options || null,
          answer: q.answer || null,
          correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : -1,
          timeLimit: q.timeLimit || 15
        };
        questions.push(question);
      }

      renderQuestionList();
      showToast(`已导入 ${bank.length} 道题目`);
    }

    function startGame() {
      if (questions.length === 0) { showToast('请先添加至少一道题目'); return; }

      gameStatus = 'playing';
      players.forEach(p => p.score = 0);

      showTeacherControl();
      $('gameStatus').textContent = '游戏进行中';
      $('gameStatus').className = 'status-badge status-success';

      updatePlayerList(players);

      publishEvent('game-start', { type: 'game-start' });

      nextQuestion();
    }

    function nextQuestion() {
      const nextIndex = currentQuestionIndex + 1;

      if (nextIndex >= questions.length) {
        const rankings = [...players].sort((a, b) => b.score - a.score);
        publishEvent('game-finished', { type: 'game-finished', rankings: rankings });
        $('nextQuestionBtn').textContent = '游戏结束';
        $('nextQuestionBtn').disabled = true;
        $('stopAnswerBtn').disabled = true;
        return;
      }

      const question = questions[nextIndex];
      currentQuestionIndex = nextIndex;

      showQuestionToTeacher(nextIndex, question);

      publishEvent('question', {
        type: 'question',
        questionIndex: nextIndex,
        question: question
      });

      if (nextIndex + 1 < questions.length) {
        $('nextQuestionBtn').textContent = '下一题';
      } else {
        $('nextQuestionBtn').textContent = '最后一题';
      }
      $('stopAnswerBtn').disabled = false;
      $('showRankingBtn').disabled = true;
      hide('teacherRankings');
    }

    function showQuestionToTeacher(qIndex, q) {
      $('teacherQuestionNumber').textContent = `第 ${qIndex + 1} 题 / 共 ${questions.length} 题`;
      $('teacherQuestionText').textContent = q.question;
      $('teacherTimerDisplay').textContent = q.timeLimit;
      $('teacherTimerDisplay').className = 'timer-display timer-normal';

      if (q.options && q.options.length > 0) {
        $('teacherOptionsDisplay').innerHTML = q.options.map((opt, i) => `
          <div class="option-btn" style="cursor:default; background: rgba(255,255,255,0.1);">
            <span class="option-letter">${String.fromCharCode(65 + i)}</span>
            <span style="font-size: 1.2rem;">${escapeHtml(opt)}</span>
          </div>
        `).join('');
      } else {
        $('teacherOptionsDisplay').innerHTML = `<div style="text-align:center;color:var(--accent);">填空题 (答案: ${q.answer})</div>`;
      }

      startTeacherTimer(q.timeLimit);
    }

    function stopAnswer() {
      const q = questions[currentQuestionIndex];
      if (!q) return;

      $('stopAnswerBtn').disabled = true;
      $('showRankingBtn').disabled = false;
      showTeacherRankings();

      const rankings = [...players].sort((a, b) => b.score - a.score);
      publishEvent('show-ranking', { type: 'show-ranking', rankings: rankings });

      publishEvent('stop-question', {
        type: 'stop-question',
        correctAnswer: q.correctAnswer
      });
    }

    function showRanking() {
      showTeacherRankings();
      const rankings = [...players].sort((a, b) => b.score - a.score);
      publishEvent('show-ranking', { type: 'show-ranking', rankings: rankings });
    }

    function showTeacherRankings() {
      const sorted = [...players].sort((a, b) => b.score - a.score);
      const container = $('teacherRankings');
      container.classList.remove('hidden');
      container.innerHTML = sorted.slice(0, 10).map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">${escapeHtml(p.name || '未知')}</span>
          <span class="ranking-score">${p.score || 0} 分</span>
        </div>
      `).join('');
    }

    function showStudentRanking(rankings) {
      if (!rankings) return;
      const container = $('studentRanking');
      container.classList.remove('hidden');
      container.innerHTML = rankings.slice(0, 10).map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">${escapeHtml(p.name || '未知')}</span>
          <span class="ranking-score">${p.score || 0} 分</span>
        </div>
      `).join('');
    }

    function resetGame() {
      if (!confirm('确定要重置游戏吗？所有得分将清零。')) return;

      gameStatus = 'waiting';
      currentQuestionIndex = -1;
      myScore = 0;
      players.forEach(p => p.score = 0);

      showTeacherRoom();
      hide('teacherRankings');

      publishEvent('game-reset', { type: 'game-reset' });
    }

    // ===== 学生功能 =====
    function showQuestionToStudent(qIndex, q) {
      show('studentQuiz');
      hide('studentWaiting');
      hide('studentResult');
      hide('studentRanking');
      $('studentQuestionNumber').textContent = `第 ${qIndex + 1} 题 / 共 ${questions.length} 题`;
      $('studentTimer').textContent = q.timeLimit;
      $('studentTimer').className = 'timer-display timer-normal';
      hasAnswered = false;
      window.selectedAnswer = null;

      if (q.options && q.options.length > 0) {
        $('studentOptions').innerHTML = q.options.map((opt, i) => `
          <button class="option-btn" onclick="selectOption(${i})" id="opt-${i}">
            ${String.fromCharCode(65 + i)}
          </button>
        `).join('');
        $('submitContainer').style.display = 'block';
        $('submitBtn').disabled = true;
      } else if (q.answer !== null && q.answer !== undefined) {
        $('studentOptions').innerHTML = `
          <div style="width: 100%; text-align: center;">
            <input type="text" id="fillAnswerInput" placeholder="请输入答案"
              style="text-align: center; font-size: 1.2rem; padding: 16px; width: 80%; max-width: 400px;"
              onkeydown="if(event.key==='Enter')submitFillAnswer()">
            <button class="btn btn-primary" onclick="submitFillAnswer()" style="margin-top: 16px;">提交答案</button>
          </div>
        `;
        $('submitContainer').style.display = 'none';
      }
      questionStartTime = Date.now();
      startStudentTimer(q.timeLimit);
    }

    function submitFillAnswer() {
      if (hasAnswered) return;
      const input = $('fillAnswerInput');
      if (!input) return;
      const userAnswer = input.value.trim();
      if (!userAnswer) { showToast('请输入答案'); return; }

      const currentQ = questions[currentQuestionIndex];
      if (!currentQ) return;

      const isCorrect = userAnswer === currentQ.answer;
      const timeTaken = (Date.now() - questionStartTime) / 1000;
      const timeBonus = Math.max(0, Math.floor((currentQ.timeLimit - timeTaken) * 50));
      const points = isCorrect ? 1000 + timeBonus : 0;

      hasAnswered = true;
      stopTimers();

      myScore += points;
      qsa('.option-btn').forEach(btn => btn.disabled = true);

      const resultEl = $('resultStatus');
      resultEl.textContent = isCorrect ? `✓ 回答正确！+${points} 分` : `✗ 正确答案是：${currentQ.answer}`;
      resultEl.style.color = isCorrect ? '#10b981' : '#ef4444';
      $('myScore').textContent = myScore;
      show('studentResult');

      publishEvent('answer-submitted', {
        type: 'answer-submitted',
        answerResult: {
          playerId: myPlayerId,
          isCorrect,
          points,
          totalScore: myScore
        }
      });
    }

    function selectOption(index) {
      if (hasAnswered) return;
      window.selectedAnswer = index;
      qsa('.option-btn').forEach((btn, i) => {
        if (i === index) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });
      const submitBtn = $('submitBtn');
      if (submitBtn) submitBtn.disabled = false;
    }

    function confirmAnswer() {
      if (window.selectedAnswer === null || window.selectedAnswer === undefined) {
        showToast('请先选择一个选项');
        return;
      }
      submitAnswer(window.selectedAnswer);
    }

    function submitAnswer(index) {
      if (hasAnswered) return;
      hasAnswered = true;

      const currentQ = questions[currentQuestionIndex];
      if (!currentQ) return;

      const isCorrect = index === currentQ.correctAnswer;
      const timeTaken = (Date.now() - questionStartTime) / 1000;
      const timeBonus = Math.max(0, Math.floor((currentQ.timeLimit - timeTaken) * 50));
      const points = isCorrect ? 1000 + timeBonus : 0;

      myScore += points;

      qsa('.option-btn').forEach(btn => btn.disabled = true);

      const resultEl = $('resultStatus');
      resultEl.textContent = isCorrect ? `✓ 回答正确！+${points} 分` : '✗ 回答错误';
      resultEl.style.color = isCorrect ? '#10b981' : '#ef4444';
      $('myScore').textContent = myScore;
      show('studentResult');

      publishEvent('answer-submitted', {
        type: 'answer-submitted',
        answerResult: {
          playerId: myPlayerId,
          isCorrect,
          points,
          totalScore: myScore
        }
      });
    }

    function updateWaitingStatus(text) {
      const el = $('waitingStatus');
      if (el) el.textContent = text;
    }

    function showFinalRanking(rankings) {
      if (!rankings) return;
      hideAllScreens();
      show('finalRanking');
      showConfetti();

      const top3 = rankings.slice(0, 3);
      let trophyHtml = '';
      if (top3.length > 0) {
        trophyHtml = `
          <div class="winner-trophy">🏆</div>
          <div class="winner-title">${top3[0].name} 获得冠军！</div>
        `;
      }
      $('winnerContainer').innerHTML = trophyHtml;

      const container = $('finalRankingList');
      container.innerHTML = rankings.map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">
            ${escapeHtml(p.name || '未知')}
            ${p.id === myPlayerId ? '<span class="ranking-you">(你)</span>' : ''}
          </span>
          <span class="ranking-score">${p.score || 0} 分</span>
        </div>
      `).join('');
    }

    function playAgain() {
      if (isHost) {
        resetGame();
      } else {
        show('studentWaiting');
        hide('finalRanking');
        updateWaitingStatus('等待老师开始新游戏...');
      }
    }

    function updatePlayerList(playerList) {
      players = playerList;
      $('playerCount').textContent = players.length;
      $('teacherPlayerList').innerHTML = players.map(p => `
        <div class="player-card">
          <div class="player-avatar">${(p.name || '?').charAt(0).toUpperCase()}</div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(p.name || '未知')}</div>
            <div class="player-score">${p.score || 0} 分</div>
          </div>
        </div>
      `).join('');
    }

    // ===== 计时器 =====
    function startStudentTimer(seconds) {
      stopTimers();
      questionStartTime = Date.now();
      timeLeft = seconds;
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = $('studentTimer');
        el.textContent = timeLeft;
        el.className = timeLeft <= 5 ? 'timer-display timer-danger' : timeLeft <= 10 ? 'timer-display timer-warning' : 'timer-display timer-normal';
        if (timeLeft <= 0) {
          stopTimers();
          if (!hasAnswered) {
            el.textContent = '时间到！';
            qsa('.option-btn').forEach(btn => btn.disabled = true);
          }
        }
      }, 1000);
    }

    function startTeacherTimer(seconds) {
      stopTimers();
      timeLeft = seconds;
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = $('teacherTimerDisplay');
        el.textContent = timeLeft;
        el.className = timeLeft <= 5 ? 'timer-display timer-danger' : timeLeft <= 10 ? 'timer-display timer-warning' : 'timer-display timer-normal';
        if (timeLeft <= 0) {
          stopTimers();
          el.textContent = '时间到！';
          $('stopAnswerBtn').disabled = false;
        }
      }, 1000);
    }

    function stopTimers() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // ===== 初始化 =====
    function populateBuiltInBankSelect() {
      const select = $('builtInBankSelect');
      select.innerHTML = '<option value="">选择题库...</option>';
      for (const bankName of Object.keys(BUILT_IN_BANKS)) {
        const count = BUILT_IN_BANKS[bankName].length;
        select.innerHTML += `<option value="${bankName}">${bankName} (${count}题)</option>`;
      }
    }

    function init() {
      populateBuiltInBankSelect();
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) {
        showStudentMode();
        $('roomCode').value = roomParam.toUpperCase();
      } else {
        showModeSelection();
      }
    }
    init();
  </script>
</body>
</html>
