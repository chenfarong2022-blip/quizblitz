<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBlitz - 实时答题竞赛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --dark: #0f172a;
      --darker: #020617;
      --light: #f8fafc;
      --glass: rgba(255,255,255,0.1);
      --glass-border: rgba(255,255,255,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--darker);
      min-height: 100vh;
      color: var(--light);
      overflow-x: hidden;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(99,102,241,0.3) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(236,72,153,0.2) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-5%, -5%) scale(1.1); }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.5;
      animation: float 20s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px rgba(99,102,241,0.5);
      animation: titleGlow 3s ease-in-out infinite;
      letter-spacing: 4px;
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(99,102,241,0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(236,72,153,0.7)); }
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;
      margin-bottom: 40px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: cardAppear 0.6s ease-out;
    }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .mode-card {
      background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(236,72,153,0.1) 100%);
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    .mode-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .mode-card:hover::before { left: 100%; }
    .mode-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(99,102,241,0.3);
    }
    .mode-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .mode-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: white;
    }
    .mode-desc {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn:active::after {
      width: 300px;
      height: 300px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.5);
    }
    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(16,185,129,0.4);
    }
    .btn-success:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(16,185,129,0.5);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
      color: white;
    }
    .btn-danger:hover { transform: translateY(-3px); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid var(--glass-border);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    input, textarea, select {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border: 2px solid var(--glass-border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: white;
      transition: all 0.3s ease;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
      background: rgba(255,255,255,0.1);
    }
    select option { background: var(--dark); color: white; }

    .room-code-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 900;
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3) 0%, rgba(236,72,153,0.2) 100%);
      border-radius: 20px;
      border: 2px solid var(--primary);
      box-shadow: 0 0 30px rgba(99,102,241,0.3);
      animation: codePulse 2s ease-in-out infinite;
      letter-spacing: 12px;
      margin: 20px 0;
    }
    @keyframes codePulse {
      0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.3); }
      50% { box-shadow: 0 0 50px rgba(236,72,153,0.5); }
    }

    .question-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.4) 0%, rgba(236,72,153,0.3) 100%);
      border: 2px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .question-number {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
      letter-spacing: 4px;
    }
    .question-text {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 30px;
      position: relative;
      line-height: 1.5;
    }

    .timer-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      margin: 20px 0;
      position: relative;
      display: inline-block;
      animation: timerPop 0.5s ease-out;
    }
    @keyframes timerPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .timer-normal { color: white; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
    .timer-warning { color: var(--accent); text-shadow: 0 0 30px rgba(245,158,11,0.8); animation: timerShake 0.5s ease-in-out infinite; }
    .timer-danger { color: var(--danger); text-shadow: 0 0 40px rgba(239,68,68,0.8); animation: timerShake 0.2s ease-in-out infinite; }
    @keyframes timerShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
    }
    .option-btn {
      padding: 24px 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      color: white;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn .option-letter {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.2);
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.3);
    }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
    .option-btn.correct {
      background: rgba(16,185,129,0.3) !important;
      border-color: var(--success) !important;
      animation: correctPulse 0.5s ease-out;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.3) !important;
      border-color: var(--danger) !important;
      animation: wrongShake 0.5s ease-out;
    }
    @keyframes correctPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .player-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }
    .player-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(4px);
    }
    .player-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .player-info { flex: 1; }
    .player-name { font-weight: 600; margin-bottom: 2px; }
    .player-score { color: var(--accent); font-weight: 700; }

    .ranking-list { margin-top: 20px; }
    .ranking-item {
      display: flex;
      align-items: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
      animation: rankingAppear 0.5s ease-out backwards;
    }
    .ranking-item:nth-child(1) { animation-delay: 0.1s; }
    .ranking-item:nth-child(2) { animation-delay: 0.2s; }
    .ranking-item:nth-child(3) { animation-delay: 0.3s; }
    @keyframes rankingAppear {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .ranking-item:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(8px);
    }
    .ranking-item.top-3 {
      background: linear-gradient(135deg, rgba(245,158,11,0.2) 0%, rgba(245,158,11,0.1) 100%);
      border: 1px solid rgba(245,158,11,0.3);
    }
    .rank-badge {
      font-size: 2rem;
      margin-right: 16px;
      width: 50px;
      text-align: center;
    }
    .rank-1 .rank-badge { filter: drop-shadow(0 0 10px gold); }
    .rank-2 .rank-badge { filter: drop-shadow(0 0 10px silver); }
    .rank-3 .rank-badge { filter: drop-shadow(0 0 10px #cd7f32); }
    .ranking-name { flex: 1; font-weight: 600; font-size: 1.1rem; }
    .ranking-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .ranking-you { color: var(--primary); font-size: 0.85rem; margin-left: 8px; }

    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      text-align: center;
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .status-info { background: rgba(99,102,241,0.3); color: var(--primary); }
    .status-success { background: rgba(16,185,129,0.3); color: var(--success); }
    .status-warning { background: rgba(245,158,11,0.3); color: var(--accent); }
    .status-danger { background: rgba(239,68,68,0.3); color: var(--danger); }

    .qr-container {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 20px;
      display: inline-block;
      margin: 20px 0;
    }
    .qr-url {
      font-family: monospace;
      background: var(--darker);
      color: var(--success);
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 16px;
      display: inline-block;
      font-size: 0.9rem;
    }

    .winner-container {
      text-align: center;
      padding: 40px;
    }
    .winner-trophy {
      font-size: 6rem;
      animation: trophyBounce 1s ease-in-out infinite;
    }
    @keyframes trophyBounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    .winner-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      margin: 20px 0;
      background: linear-gradient(135deg, gold 0%, orange 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .form-section {
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 24px;
    }
    .form-section h3 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .question-list { margin-top: 24px; }
    .question-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border-left: 4px solid var(--primary);
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .question-item-header { font-weight: 600; margin-bottom: 8px; }
    .question-item-options { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
    .correct-badge { color: var(--success); font-weight: 700; }

    .hidden { display: none !important; }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .section-title {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    .game-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: toastIn 0.5s ease-out, toastOut 0.5s ease-in 2.5s forwards;
      z-index: 1000;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <h1>QUIZBLITZ</h1>
    <p class="subtitle">实时答题竞赛</p>

    <!-- 模式选择 -->
    <div id="modeSelection" class="card">
      <div class="mode-grid">
        <div class="mode-card" onclick="showTeacherMode()">
          <span class="mode-icon">👨‍🏫</span>
          <div class="mode-title">我是老师</div>
          <div class="mode-desc">创建房间、添加题目、发起游戏</div>
        </div>
        <div class="mode-card" onclick="showStudentMode()">
          <span class="mode-icon">👨‍🎓</span>
          <div class="mode-title">我是学生</div>
          <div class="mode-desc">扫码或输入房间码加入游戏</div>
        </div>
      </div>
    </div>

    <!-- 老师模式 -->
    <div id="teacherJoin" class="card hidden">
      <h2>👨‍🏫 老师控制台</h2>
      <div id="teacherRoomInfo" class="hidden">
        <div class="section-title">房间码</div>
        <div class="room-code-display" id="teacherRoomCode"></div>
        <p style="text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 20px;">分享给学生的加入链接</p>
        <div style="text-align: center; margin-bottom: 30px;">
          <button class="btn btn-secondary" onclick="showQrModal()">📱 显示二维码</button>
        </div>
        <div class="game-controls">
          <button class="btn btn-primary" onclick="showTeacherEditor()">📝 编辑题目</button>
          <button class="btn btn-success" onclick="startGame()">🎮 开始游戏</button>
          <button class="btn btn-danger" onclick="resetGame()">🔄 重置</button>
        </div>
      </div>
      <div id="teacherCreate">
        <div style="text-align: center; padding: 40px 0;">
          <button class="btn btn-primary" onclick="createRoom()" style="padding: 20px 50px; font-size: 1.2rem;">
            ✨ 创建新房间
          </button>
        </div>
        <div style="text-align: center;">
          <button class="btn btn-secondary" onclick="showModeSelection()">← 返回选择</button>

  <!-- Firebase SDK -->

  <script>
    // ===== Firebase 配置 =====
    const firebaseConfig = {
      apiKey: "AIzaSyD0HVxdpw2KfM7qSbMQxHFdCFgQ3S803sY",
      authDomain: "quizblitz-feab7.firebaseapp.com",
      databaseURL: "https://quizblitz-feab7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "quizblitz-feab7",
      storageBucket: "quizblitz-feab7.firebasestorage.app",
      messagingSenderId: "1073376052530",
      appId: "1:1073376052530:web:f1edd120598f294099c32b",
      measurementId: "G-8VGZZ3Z930"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();
    console.log('Firebase initialized, database URL:', firebaseConfig.databaseURL);

    // ===== 状态 =====
    let myRole = null;
    let myPlayerId = null;
    let roomCode = null;
    let isHost = false;
    let questions = [];
    let currentQuestionIndex = -1;
    let gameStatus = 'waiting';
    let timerInterval = null;
    let timeLeft = 0;
    let hasAnswered = false;
    let myScore = 0;
    let questionStartTime = 0;
    let roomRef = null;
    let playerRef = null;
    let presenceRef = null;

    // ===== 工具函数 =====
    const $ = id => document.getElementById(id);
    const show = id => $(id).classList.remove('hidden');
    const hide = id => $(id).classList.add('hidden');
    const qsa = sel => document.querySelectorAll(sel);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ===== 粒子背景 =====
    function initParticles() {
      const container = $('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        const colors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        container.appendChild(particle);
      }
    }
    initParticles();

    // ===== 彩带庆祝 =====
    function showConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti';
      document.body.appendChild(container);
      const colors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#ef4444', '#ffd700'];
      for (let i = 0; i < 100; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 4000);
    }

    // ===== QR码 =====
    function generateQR(text) {
      const canvas = $('qrcode');
      const size = 200;
      canvas.width = size;
      canvas.height = size;
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
      };
      img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
    }

    function showQrModal() {
      // 修复 GitHub Pages 路径问题
      let baseUrl = window.location.origin;
      // 如果在 GitHub Pages 下，确保路径正确
      if (window.location.pathname.includes('/quizblitz/')) {
        baseUrl = window.location.origin + '/quizblitz';
      }
      const joinUrl = `${baseUrl}?room=${roomCode}`;
      console.log('QR URL:', joinUrl);
      $('qrUrl').textContent = joinUrl;
      generateQR(joinUrl);
      hideAllScreens();
      show('qrModal');
    }

    function closeQrModal() {
      if (isHost) {
        // 显示房间控制面板，而不是"创建新房间"按钮
        hideAllScreens();
        show('teacherJoin');
        show('teacherRoomInfo');
      }
    }

    // ===== 界面切换 =====
    function hideAllScreens() {
      ['modeSelection', 'teacherJoin', 'teacherEditor', 'teacherControl',
       'studentMode', 'studentQuiz', 'finalRanking', 'qrModal'].forEach(id => hide(id));
    }

    function showModeSelection() { hideAllScreens(); show('modeSelection'); }
    function showTeacherMode() { hideAllScreens(); show('teacherJoin'); }
    function showStudentMode() {
      hideAllScreens();
      show('studentMode');
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) $('roomCode').value = roomParam.toUpperCase();
    }
    function showTeacherRoom() {
      hideAllScreens();
      show('teacherJoin');
      show('teacherCreate');
      hide('teacherRoomInfo');
    }
    function showTeacherEditor() {
      hideAllScreens();
      show('teacherJoin');
      show('teacherEditor');
      show('teacherRoomInfo');
      // 重置创建房间按钮状态
      const btn = document.querySelector('#teacherCreate .btn-primary');
      if (btn) {
        btn.innerHTML = '✨ 创建新房间';
        btn.disabled = false;
      }
      renderQuestionList();
    }
    function showTeacherControl() {
      hideAllScreens();
      show('teacherJoin');
      show('teacherControl');
      show('teacherRoomInfo');
    }

    // ===== Firebase Realtime Database =====
    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function createRoom() {
      roomCode = generateRoomCode();
      roomRef = database.ref('rooms/' + roomCode);

      console.log('Creating room:', roomCode);

      // 显示加载状态
      const btn = document.querySelector('#teacherCreate .btn-primary');
      if (btn) {
        btn.innerHTML = '<span class="loading"></span> 创建房间中...';
        btn.disabled = true;
      }

      // 创建房间
      roomRef.set({
        hostId: 'pending',
        createdAt: Date.now(),
        gameStatus: 'waiting',
        currentQuestion: -1
      }).then(() => {
        console.log('Room created successfully');
        // 房间创建成功，设置为老师
        myRole = 'teacher';
        isHost = true;
        myPlayerId = 'host_' + Date.now();

        // 更新 hostId
        return roomRef.update({ hostId: myPlayerId });
      }).then(() => {
        console.log('Host ID updated');
        $('teacherRoomCode').textContent = roomCode;
        hide('teacherCreate');
        show('teacherRoomInfo');
        showQrModal();

        // 监听房间状态
        setupRoomListener();
      }).catch(err => {
        console.error('Create room error:', err);
        showToast('创建房间失败: ' + err.message);
        // 重置按钮
        const btn = document.querySelector('#teacherCreate .btn-primary');
        if (btn) {
          btn.innerHTML = '✨ 创建新房间';
          btn.disabled = false;
        }
      });
    }

    function joinRoom() {
      const code = $('roomCode').value.trim().toUpperCase();
      const name = $('playerName').value.trim() || '玩家' + Math.floor(Math.random() * 1000);
      if (!code || code.length < 4) { showToast('请输入正确的房间码'); return; }

      roomCode = code;
      myRole = 'student';
      myPlayerId = 'player_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      isHost = false;

      // 显示等待界面
      $('studentRoomCode').textContent = roomCode;
      show('studentWaiting');
      hide('studentJoin');
      updateWaitingStatus('正在连接房间...');

      roomRef = database.ref('rooms/' + roomCode);

      console.log('Student joining room:', roomCode);

      // 设置超时
      const timeout = setTimeout(() => {
        updateWaitingStatus('连接超时，请检查房间码是否正确');
      }, 10000);

      // 检查房间是否存在
      roomRef.once('value').then(snapshot => {
        clearTimeout(timeout);
        console.log('Room exists:', snapshot.exists());

        if (!snapshot.exists()) {
          updateWaitingStatus('房间不存在或已结束');
          showToast('房间不存在或已结束');
          return;
        }

        // 加入房间
        const playerRef = database.ref('rooms/' + roomCode + '/players/' + myPlayerId);
        playerRef.set({
          name: name,
          score: 0,
          correctCount: 0,
          joinedAt: Date.now(),
          isHost: false
        }).then(() => {
          console.log('Player added to room');
          updateWaitingStatus('已加入房间，等待游戏开始...');

          console.log('Setting up room listener after join');
          console.log('roomRef before setup:', roomRef ? roomRef.toString() : 'null');
          console.log('isHost:', isHost, 'myRole:', myRole);

          // 监听房间状态
          setupRoomListener();
          console.log('Room listener setup complete');
        }).catch(err => {
          console.error('Join room error:', err);
          updateWaitingStatus('加入房间失败');
          showToast('加入房间失败: ' + err.message);
        });
      }).catch(err => {
        clearTimeout(timeout);
        console.error('Check room error:', err);
        updateWaitingStatus('连接失败，请检查网络');
        showToast('连接失败: ' + err.message);
      });
    }

    function setupRoomListener() {
      console.log('Setting up room listener for:', roomCode);
      console.log('Room ref path:', roomRef ? roomRef.toString() : 'NULL');

      if (!roomRef) {
        console.error('roomRef is null!');
        updateWaitingStatus('连接错误：房间引用无效');
        return;
      }

      // 1. 监听房间数据变化（主监听器）
      roomRef.on('value', snapshot => {
        console.log('Room data changed!');
        const data = snapshot.val();
        if (!data) {
          console.log('No data in snapshot');
          return;
        }
        console.log('gameStatus:', data.gameStatus, 'currentQuestion:', data.currentQuestion);

        // 更新题目列表
        if (data.questions) {
          questions = Object.values(data.questions);
        }

        // 检查游戏状态变化
        if (data.gameStatus === 'playing' && gameStatus !== 'playing') {
          gameStatus = 'playing';
          console.log('Game started!');
          if (isHost) {
            showTeacherControl();
            $('gameStatus').textContent = '游戏进行中';
            $('gameStatus').className = 'status-badge status-success';
            $('nextQuestionBtn').disabled = false;
            hide('teacherRankings');
          } else {
            console.log('Student: game has started!');
            updateWaitingStatus('游戏开始！等待发题...');
          }
        }

        // 检查当前题目
        if (data.currentQuestion !== undefined && data.currentQuestion >= 0) {
          const qIndex = data.currentQuestion;
          console.log('Question index:', qIndex, 'stored:', currentQuestionIndex);

          // 获取题目
          let questionData = null;
          if (data.questions) {
            const questionKeys = Object.keys(data.questions);
            if (questionKeys.length > qIndex) {
              const key = questionKeys[qIndex];
              questionData = data.questions[key];
            }
          }

          if (questionData && qIndex !== currentQuestionIndex) {
            currentQuestionIndex = qIndex;
            const q = questionData;

            if (myRole === 'student') {
              show('studentQuiz');
              hide('studentWaiting');
              hide('studentResult');
              hide('studentRanking');
              $('studentQuestionNumber').textContent = `第 ${qIndex + 1} 题 / 共 ${questions.length} 题`;
              $('studentQuestionText').textContent = q.question;
              $('studentTimer').textContent = q.timeLimit;
              $('studentTimer').className = 'timer-display timer-normal';
              hasAnswered = false;
              $('studentOptions').innerHTML = q.options.map((opt, i) => `
                <button class="option-btn" onclick="submitAnswer(${i})" id="opt-${i}">
                  <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                  ${escapeHtml(opt)}
                </button>
              `).join('');
              startStudentTimer(q.timeLimit);
            } else if (isHost) {
              $('gameStatus').textContent = `第 ${qIndex + 1} 题进行中`;
              $('questionNumber').textContent = `第 ${qIndex + 1} 题 / 共 ${questions.length} 题`;
              $('questionDisplay').textContent = q.question;
              show('currentQuestionDisplay');
              $('nextQuestionBtn').disabled = true;
              $('nextQuestionBtn').textContent = `第 ${qIndex + 2} 题`;
              $('stopAnswerBtn').disabled = false;
              $('showRankingBtn').disabled = true;
              startTeacherTimer(q.timeLimit);
            }
          }
        }

        // 检查游戏结束
        if (data.gameStatus === 'finished' && gameStatus !== 'finished') {
          gameStatus = 'finished';
          showConfetti();
          if (isHost) {
            showTeacherControl();
            $('gameStatus').textContent = '游戏结束';
            $('gameStatus').className = 'status-badge status-success';
            $('nextQuestionBtn').disabled = true;
            showTeacherRankings(getRankingsFromPlayers());
          } else if (myRole === 'student') {
            showFinalRanking(getRankingsFromPlayers());
          }
        }

        // 检查重置
        if (data.gameStatus === 'waiting' && gameStatus !== 'waiting' && gameStatus !== '') {
          gameStatus = 'waiting';
          currentQuestionIndex = -1;
          myScore = 0;
          if (isHost) {
            showTeacherRoom();
            hide('teacherRankings');
          } else if (myRole === 'student') {
            show('studentWaiting');
            hide('studentQuiz');
            updateWaitingStatus('游戏已重置，等待再次开始');
          }
        }
      });

      // 2. 监听玩家列表
      const playersRef = database.ref('rooms/' + roomCode + '/players');
      playersRef.on('value', snapshot => {
        const players = [];
        snapshot.forEach(child => {
          const p = child.val();
          p.id = child.key;
          players.push(p);
        });
        updatePlayerList(players);

        if (myRole === 'student') {
          updateWaitingStatus(`已加入房间，等待游戏开始 (${players.length}人在线)`);
        }
      });

      // 3. 监听答题结果（学生端）
      if (!isHost) {
        const answersRef = database.ref('rooms/' + roomCode + '/answers');
        answersRef.on('child_added', snapshot => {
          const answer = snapshot.val();
          if (answer.playerId === myPlayerId) {
            hasAnswered = true;
            stopTimers();
            const resultEl = $('resultStatus');
            if (answer.isCorrect) {
              resultEl.textContent = `✓ 回答正确！+${answer.points} 分`;
              resultEl.style.color = '#10b981';
            } else {
              resultEl.textContent = '✗ 回答错误';
              resultEl.style.color = '#ef4444';
            }
            myScore = answer.totalScore;
            $('myScore').textContent = myScore;
            show('studentResult');
            qsa('.option-btn').forEach(btn => btn.disabled = true);
          }
        });

        // 4. 监听停止答题
        const stopRef = database.ref('rooms/' + roomCode + '/currentQuestion/stopped');
        stopRef.on('value', snapshot => {
          if (snapshot.val() === true && myRole === 'student' && !hasAnswered) {
            stopTimers();
            qsa('.option-btn').forEach(btn => btn.disabled = true);
            const data = snapshot.parent.val();
            if (data && data.correctAnswer !== undefined) {
              const correctOpt = $(`opt-${data.correctAnswer}`);
              if (correctOpt) correctOpt.classList.add('correct');
            }
          }
        });
      }
    }

    function getRankings() {
      return []; // 会在实际实现中从 Firebase 获取
    }

    // ===== 教师功能 =====
    function addSingleQuestion() {
      const question = $('questionText').value.trim();
      const options = [$('option0').value.trim(), $('option1').value.trim(),
                       $('option2').value.trim(), $('option3').value.trim()];
      const correctAnswer = parseInt($('correctAnswer').value);
      const timeLimit = parseInt($('timeLimit').value) || 15;

      if (!question || options.some(o => !o)) {
        showToast('请填写完整题目和所有选项');
        return;
      }

      if (!roomCode) {
        showToast('房间未创建，请先创建房间');
        return;
      }

      const questionId = 'q_' + Date.now();
      const newQuestion = {
        id: questionId,
        question,
        options,
        correctAnswer,
        timeLimit
      };

      console.log('Adding question to room:', roomCode);

      // 保存到 Firebase
      database.ref('rooms/' + roomCode + '/questions/' + questionId).set(newQuestion)
        .then(() => {
          console.log('Question added successfully');
          questions.push(newQuestion);
          renderQuestionList();
          $('questionText').value = '';
          $('option0').value = ''; $('option1').value = ''; $('option2').value = ''; $('option3').value = '';
          showToast('题目添加成功');
        })
        .catch(err => {
          console.error('Add question error:', err);
          showToast('添加失败: ' + err.message);
        });
    }

    function importQuestions() {
      const text = $('jsonImport').value.trim();
      if (!text) { showToast('请输入 JSON 数据'); return; }
      let imported;
      try { imported = JSON.parse(text); } catch (e) { showToast('JSON 格式错误'); return; }
      if (!Array.isArray(imported)) imported = [imported];

      const updates = {};
      imported.forEach((q, i) => {
        const questionId = 'q_' + Date.now() + '_' + i;
        updates['rooms/' + roomCode + '/questions/' + questionId] = {
          id: questionId,
          question: q.question,
          options: q.options,
          correctAnswer: q.correctAnswer,
          timeLimit: q.timeLimit || 15
        };
        questions.push({ id: questionId, ...q });
      });

      database.ref().update(updates)
        .then(() => {
          $('jsonImport').value = '';
          renderQuestionList();
          showToast(`成功导入 ${imported.length} 道题目`);
        })
        .catch(err => showToast('导入失败: ' + err.message));
    }

    function renderQuestionList() {
      const container = $('questionList');
      if (questions.length === 0) {
        container.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">暂无题目，请添加题目</p>';
        return;
      }
      container.innerHTML = `
        <h3 style="margin-bottom: 16px;">已添加 ${questions.length} 道题目</h3>
        ${questions.map((q, i) => `
          <div class="question-item">
            <div class="question-item-header">${i + 1}. ${escapeHtml(q.question)}</div>
            <div class="question-item-options">
              ${q.options.map((o, j) => `<span class="${j === q.correctAnswer ? 'correct-badge' : ''}">${String.fromCharCode(65 + j)}. ${escapeHtml(o)}</span>`).join(' | ')}
            </div>
          </div>
        `).join('')}
      `;
    }

    function startGame() {
      if (questions.length === 0) { showToast('请先添加至少一道题目'); return; }
      roomRef.update({
        gameStatus: 'playing',
        currentQuestion: -1
      }).then(() => {
        // 重置所有玩家分数
        database.ref('rooms/' + roomCode + '/players').once('value').then(snapshot => {
          const updates = {};
          snapshot.forEach(child => {
            updates['rooms/' + roomCode + '/players/' + child.key + '/score'] = 0;
            updates['rooms/' + roomCode + '/players/' + child.key + '/correctCount'] = 0;
          });
          database.ref().update(updates);
        });
        showTeacherControl();
        $('gameStatus').textContent = '游戏进行中';
        $('gameStatus').className = 'status-badge status-success';
        $('nextQuestionBtn').textContent = '第 1 题';
        $('nextQuestionBtn').disabled = false;
      }).catch(err => showToast('启动失败: ' + err.message));
    }

    function nextQuestion() {
      const nextIndex = currentQuestionIndex + 1;
      console.log('nextQuestion called, nextIndex:', nextIndex, 'questions length:', questions.length);
      if (nextIndex >= questions.length) {
        // 游戏结束
        roomRef.update({ gameStatus: 'finished' });
        return;
      }

      console.log('Sending question to Firebase, index:', nextIndex);
      roomRef.update({
        currentQuestion: nextIndex,
        currentQuestionData: questions[nextIndex],
        'currentQuestion/stopped': false,
        'currentQuestion/correctAnswer': questions[nextIndex].correctAnswer
      }).then(() => {
        console.log('Question sent to Firebase - update completed');
        $('nextQuestionBtn').disabled = true;
        $('stopAnswerBtn').disabled = false;
        $('showRankingBtn').disabled = true;
        hide('teacherRankings');
      }).catch(err => {
        console.error('Update failed:', err);
        showToast('发题失败: ' + err.message);
      });
    }

    function stopAnswer() {
      roomRef.child('currentQuestion').update({ stopped: true })
        .then(() => {
          $('stopAnswerBtn').disabled = true;
          $('showRankingBtn').disabled = false;
          // 显示排名
          showTeacherRankings(getRankingsFromPlayers());
        })
        .catch(err => showToast('停止失败: ' + err.message));
    }

    function showRanking() {
      showTeacherRankings(getRankingsFromPlayers());
    }

    function getRankingsFromPlayers() {
      // 这个函数会在回调中被调用，实际排名数据通过参数传入
      return [];
    }

    function fetchRankings(callback) {
      database.ref('rooms/' + roomCode + '/players').orderByChild('score').once('value', snapshot => {
        const players = [];
        snapshot.forEach(child => {
          const p = child.val();
          p.id = child.key;
          players.push(p);
        });
        players.reverse(); // 从高到低
        if (callback) callback(players);
      });
    }

    function resetGame() {
      if (!confirm('确定要重置游戏吗？所有得分将清零。')) return;
      roomRef.update({
        gameStatus: 'waiting',
        currentQuestion: -1
      }).then(() => {
        database.ref('rooms/' + roomCode + '/answers').remove();
        showTeacherRoom();
        hide('teacherRankings');
      }).catch(err => showToast('重置失败: ' + err.message));
    }

    // ===== 学生功能 =====
    function submitAnswer(index) {
      if (hasAnswered) return;
      hasAnswered = true;

      const currentQ = questions[currentQuestionIndex];
      const isCorrect = index === currentQ.correctAnswer;
      const timeTaken = (Date.now() - questionStartTime) / 1000;
      const timeBonus = Math.max(0, Math.floor((currentQ.timeLimit - timeTaken) * 50));
      const points = isCorrect ? 1000 + timeBonus : 0;

      myScore += points;

      const answerRef = database.ref('rooms/' + roomCode + '/answers').push();
      answerRef.set({
        playerId: myPlayerId,
        answer: index,
        isCorrect,
        points,
        totalScore: myScore,
        timeTaken: Math.round(timeTaken * 100) / 100
      });

      // 更新自己的分数
      database.ref('rooms/' + roomCode + '/players/' + myPlayerId).update({
        score: myScore,
        correctCount: isCorrect ? firebase.database.ServerValue.increment(1) : 0
      });

      qsa('.option-btn').forEach(btn => btn.disabled = true);
    }

    function updateWaitingStatus(text) {
      const el = $('waitingStatus');
      if (el) el.textContent = text;
    }

    function showTeacherRankings(rankings) {
      const container = $('teacherRankings');
      container.classList.remove('hidden');
      container.innerHTML = rankings.slice(0, 10).map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">${escapeHtml(p.name)}</span>
          <span class="ranking-score">${p.score} 分</span>
        </div>
      `).join('');
    }

    function showStudentRanking(rankings) {
      hide('studentQuiz');
      show('studentRanking');
      const container = $('studentRanking');
      container.innerHTML = rankings.slice(0, 5).map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">
            ${escapeHtml(p.name)}
            ${p.id === myPlayerId ? '<span class="ranking-you">(你)</span>' : ''}
          </span>
          <span class="ranking-score">${p.score} 分</span>
        </div>
      `).join('');
    }

    function showFinalRanking(rankings) {
      hideAllScreens();
      show('finalRanking');
      showConfetti();

      const top3 = rankings.slice(0, 3);
      let trophyHtml = '';
      if (top3.length > 0) {
        trophyHtml = `
          <div class="winner-trophy">🏆</div>
          <div class="winner-title">${top3[0].name} 获得冠军！</div>
        `;
      }
      $('winnerContainer').innerHTML = trophyHtml;

      const container = $('finalRankingList');
      container.innerHTML = rankings.map((p, i) => `
        <div class="ranking-item ${i < 3 ? 'top-3' : ''} rank-${i + 1}">
          <span class="rank-badge">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}</span>
          <span class="ranking-name">
            ${escapeHtml(p.name)}
            ${p.id === myPlayerId ? '<span class="ranking-you">(你)</span>' : ''}
          </span>
          <span class="ranking-score">${p.score} 分</span>
        </div>
      `).join('');

      const myRank = rankings.findIndex(p => p.id === myPlayerId);
      if (myRank >= 0 && myRank < 3) {
        const messages = ['🎉 恭喜你获得第一名！', '🥈 你获得了第二名！', '🥉 你获得了第三名！'];
        container.innerHTML += `
          <div style="text-align: center; margin-top: 20px; font-size: 1.3em; color: var(--accent);">${messages[myRank]}</div>
        `;
      }
    }

    function playAgain() {
      if (isHost) {
        resetGame();
      } else {
        show('studentWaiting');
        hide('finalRanking');
        updateWaitingStatus('等待老师开始新游戏...');
      }
    }

    // ===== 玩家列表 =====
    function updatePlayerList(players) {
      $('playerCount').textContent = players.length;
      $('teacherPlayerList').innerHTML = players.map(p => `
        <div class="player-card">
          <div class="player-avatar">${(p.name || '?').charAt(0).toUpperCase()}</div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(p.name || '未知')}</div>
            <div class="player-score">${p.score || 0} 分</div>
          </div>
        </div>
      `).join('');
    }

    // ===== 计时器 =====
    function startStudentTimer(seconds) {
      stopTimers();
      questionStartTime = Date.now();
      timeLeft = seconds;
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = $('studentTimer');
        el.textContent = timeLeft;
        el.className = timeLeft <= 5 ? 'timer-display timer-danger' : timeLeft <= 10 ? 'timer-display timer-warning' : 'timer-display timer-normal';
        if (timeLeft <= 0) { stopTimers(); if (!hasAnswered) { el.textContent = '时间到！'; qsa('.option-btn').forEach(btn => btn.disabled = true); } }
      }, 1000);
    }

    function startTeacherTimer(seconds) {
      stopTimers();
      timeLeft = seconds;
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = $('timerDisplay');
        el.textContent = timeLeft;
        el.className = timeLeft <= 5 ? 'timer-display timer-danger' : timeLeft <= 10 ? 'timer-display timer-warning' : 'timer-display timer-normal';
        if (timeLeft <= 0) { stopTimers(); el.textContent = '时间到！'; $('stopAnswerBtn').disabled = false; }
      }, 1000);
    }

    function stopTimers() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

    // ===== 初始化 =====
    function init() {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) { showStudentMode(); $('roomCode').value = roomParam.toUpperCase(); }
      else showModeSelection();
    }
    init();
  </script>
</body>
</html>
